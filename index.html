<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibbia & Corano: Digital Detective Pro</title>
    <style>
        :root { --primary: #1a2a6c; --accent: #f2994a; --bg: #f0f2f5; --quran: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--accent); }
        
        /* Personaggi Interattivi */
        .character-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .char-card { background: white; border: 2px solid #ddd; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .char-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .char-card img { width: 80px; height: 80px; border-radius: 50%; background: #eee; margin-bottom: 10px; }
        .char-name { font-weight: bold; display: block; font-size: 1.2em; color: var(--primary); }
        .char-alias { font-style: italic; color: var(--quran); font-size: 0.9em; }

        /* Modal / Dettagli */
        #detail-box { display: none; background: #fffbe6; border: 2px solid var(--accent); padding: 20px; border-radius: 15px; margin-top: 20px; animation: fadeIn 0.5s; }
        
        /* Tabella Missioni */
        .mission-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        .mission-table th { background: var(--primary); color: white; padding: 10px; }
        .mission-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .coord { background: #e8f0fe; padding: 2px 5px; border-radius: 4px; font-family: monospace; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-link { background: var(--primary); color: white; padding: 12px 25px; text-decoration: none; border-radius: 30px; display: inline-block; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🕵️‍♂️ Bible & Quran Detective</h1>
    
    <center>
        <p>Clicca sui personaggi per scoprire il loro "Identikit Condiviso" e sbloccare la ricerca!</p>
        <a href="https://www.bibbiaedu.it/CEI2008/" target="_blank" class="btn-link">🌐 Apri BibbiaEdu (Sito CEI 2008)</a>
    </center>

    <div class="character-grid">
        <div class="char-card" onclick="showDetail('gesu')">
            <span class="char-name">Gesù</span>
            <span class="char-alias">Corano: 'Isa</span>
        </div>
        <div class="char-card" onclick="showDetail('maria')">
            <span class="char-name">Maria</span>
            <span class="char-alias">Corano: Maryam</span>
        </div>
        <div class="char-card" onclick="showDetail('isaia')">
            <span class="char-name">Isaia</span>
            <span class="char-alias">Profeta del Banchetto</span>
        </div>
        <div class="char-card" onclick="showDetail('giuseppe')">
            <span class="char-name">Giuseppe</span>
            <span class="char-alias">Corano: Yusuf</span>
        </div>
    </div>

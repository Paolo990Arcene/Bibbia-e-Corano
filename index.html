<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibbia & Corano: La Sfida dei Detective</title>
    <style>
        :root { --bibbia: #1a2a6c; --corano: #27ae60; --oro: #f2994a; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--bibbia); text-transform: uppercase; letter-spacing: 2px; }
        .intro { text-align: center; margin-bottom: 30px; color: #555; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        
        /* MEMORY DEI PERSONAGGI */
        .character-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin: 30px 0; }
        .card { perspective: 1000px; height: 180px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card.flipped .card-inner { transform: rotateY(180px); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; padding: 10px; box-sizing: border-box; }
        .card-front { background: white; border: 2px solid var(--bibbia); color: var(--bibbia); }
        .card-back { background: var(--corano); color: white; transform: rotateY(180px); font-size: 0.9em; }
        .card-front strong { font-size: 1.3em; }

        /* TABELLA COORDINATE */
        .mission-box { background: #fff3e0; padding: 20px; border-radius: 15px; border: 2px dashed var(--oro); margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: var(--bibbia); color: white; padding: 12px; }
        td { padding: 12px; border: 1px solid #ddd; font-size: 0.95em; }

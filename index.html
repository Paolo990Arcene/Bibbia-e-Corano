<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Detective delle Scritture: Missione Bibbia-Corano</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f2994a;
            --quran: #27ae60;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--primary); font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }

        /* Griglia Carte */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { 
            background: linear-gradient(135deg, var(--primary), #3b5998);
            color: white; padding: 30px 20px; border-radius: 15px; text-align: center;
            cursor: pointer; transition: all 0.3s ease; border: none; font-size: 1.2em; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); background: var(--accent); }

        /* Pop-up (Modal) */
        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
        }
        .modal-content { 
            background-color: white; margin: 10% auto; padding: 40px; border-radius: 20px; 
            width: 80%; max-width: 500px; text-align: center; position: relative;
            animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; cursor: pointer; color: #999; }
        .modal-h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        .modal-body { margin-top: 20px; line-height: 1.6; font-size: 1.1em; color: #444; }
        .quran-name { color: var(--quran); font-weight: bold; font-size: 1.3em; display: block; margin: 10px 0; }

        /* Tabella Missioni */
        .mission-section { margin-top: 50px; background: #fdfdfd; padding: 20px; border-radius: 15px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .coord-box { background: #ffeaa7; padding: 5px 10px; border-radius: 5px; font-family: monospace; font-weight: bold; color: #d35400; }
        .btn-web { display: block; width: fit-content; margin: 20px auto; background: var(--quran); color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
